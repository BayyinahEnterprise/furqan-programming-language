name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Verify surface counts
        run: |
          python -c "from furqan.parser import __all__; assert len(__all__) >= 42, f'parser surface {len(__all__)}'"
          python -c "from furqan.checker import __all__; assert len(__all__) >= 29, f'checker surface {len(__all__)}'"
          python -c "from furqan.errors import __all__; assert len(__all__) >= 4, f'errors surface {len(__all__)}'"

      - name: Verify version sync
        run: python -m pytest tests/test_version_sync.py -q
