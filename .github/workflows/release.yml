name: Release

# Publishes furqan to PyPI on every v* tag pushed to origin.
#
# This workflow mirrors the release.yml in furqan-lint. The build
# job validates the artifact (one wheel, one sdist, both pure
# Python), verifies the tagged commit is an ancestor of origin/main
# (defends against tags pushed to local-only commits), and verifies
# the tag version matches pyproject.toml and CHANGELOG.md.
#
# Publish uses PyPI Trusted Publishing (OIDC); no API token. The
# pypi environment must be configured under Settings -> Environments
# with the 'pypi' name, and pypi.org must have a Trusted Publisher
# entry for this repo + workflow + environment.

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify build
        run: |
          ls -lh dist/
          # furqan is pure Python; expect exactly one wheel
          # (py3-none-any) and one sdist (.tar.gz).
          test "$(ls dist/*.whl | wc -l)" -eq 1
          test "$(ls dist/*.tar.gz | wc -l)" -eq 1
          ls dist/*.whl | grep -q "py3-none-any.whl"

      - name: Verify tag is an ancestor of origin/main
        run: |
          git fetch origin main --depth=50
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit $GITHUB_SHA is not an ancestor of origin/main"
            exit 1
          fi
          echo "Tag commit is on origin/main: ok"

      - name: Verify version-tag-CHANGELOG sync
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag version $TAG_VERSION != pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          if ! grep -q "^## \[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "CHANGELOG.md has no entry for [${TAG_VERSION}]"
            exit 1
          fi
          echo "Tag/pyproject/CHANGELOG version sync: $TAG_VERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
